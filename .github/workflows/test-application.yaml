on:
  workflow_call:
jobs:
  test_application:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
      - name: Setup Node.JS
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Run Unit tests
        run: npm run tests
      - name: Run e2e tests
        run: npm run test:e2e
